name: Build App
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: "temurin"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Decode keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build signed AAB and APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        set +e
        ./gradlew bundleRelease assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle_out.txt
        code=${PIPESTATUS[0]}
        if [ "$code" -ne 0 ]; then
          echo "===== GRADLE FAILED (tail) ====="
          tail -100 gradle_out.txt
          awk '/What went wrong:/{f=1} f{print} /^\* Try:|BUILD FAILED/{if(f)exit}' gradle_out.txt > wrong.txt
          grep -nE "Caused by:|error:|Could not|Unsupported|incompatible|requires|No matching|not found|Failed to" gradle_out.txt | tail -15 >> wrong.txt
          while IFS= read -r line; do
            clean=$(printf '%s' "$line" | sed 's/%/%25/g; s/\r//g' | cut -c1-300)
            [ -n "$clean" ] && echo "::error::$clean"
          done < wrong.txt
          exit "$code"
        fi

    - name: Upload AAB (for Play Store)
      uses: actions/upload-artifact@v4
      with:
        name: KitabMall-AAB
        path: app/build/outputs/bundle/release/app-release.aab
        retention-days: 30

    - name: Upload APK (for phone testing)
      uses: actions/upload-artifact@v4
      with:
        name: KitabMall-APK
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
