name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
    
    - name: Setup Android SDK
      run: |
        sudo apt-get install -y wget unzip
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
        mkdir -p $HOME/android-sdk/cmdline-tools
        unzip -q cmdtools.zip -d $HOME/android-sdk/cmdline-tools
        mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
    
    - name: Accept licenses and install SDK
      run: |
        yes | sdkmanager --sdk_root=$HOME/android-sdk --licenses || true
        sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-34" "build-tools;34.0.0"
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      env:
        ANDROID_HOME: $HOME/android-sdk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KitabMall-App
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
