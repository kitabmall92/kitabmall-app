name: Build App
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: "temurin"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Decode keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build signed AAB and APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew bundleRelease assembleRelease --no-daemon

    - name: Upload AAB (for Play Store)
      uses: actions/upload-artifact@v4
      with:
        name: KitabMall-AAB
        path: app/build/outputs/bundle/release/app-release.aab
        retention-days: 30

    - name: Upload APK (for phone testing)
      uses: actions/upload-artifact@v4
      with:
        name: KitabMall-APK
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
